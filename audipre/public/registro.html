<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — AudiPre</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="topbar">
  <a href="/" class="marca">
    <div class="onda-marca"><span></span><span></span><span></span></div>
    <div class="marca-texto">AudiPre<small>Pre-implante coclear</small></div>
  </a>
  <div class="nav-usuario">
    <a href="/login.html" class="btn btn-texto">Ya tengo cuenta</a>
  </div>
</header>

<div class="contenedor" style="max-width: 520px; padding-top: 48px; padding-bottom: 64px;">
  <h1 style="font-size: 28px; text-align: center;">Crea tu cuenta</h1>
  <p style="text-align:center; color: var(--tinta-suave); margin-bottom: 32px;">
    Elige cómo vas a usar AudiPre.
  </p>

  <div class="selector-rol">
    <button type="button" class="tarjeta-rol activa" data-rol="padre">
      <h3>Soy padre o tutor</h3>
      <p>Quiero seguir la guía de ejercicios y registrar la rehabilitación en casa.</p>
    </button>
    <button type="button" class="tarjeta-rol" data-rol="logopeda">
      <h3>Soy logopeda</h3>
      <p>Quiero dar seguimiento a las familias y ver el progreso de mis niños.</p>
    </button>
  </div>

  <form id="form-registro" class="tarjeta" style="margin-top: 28px;">
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" required autocomplete="name">

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" required autocomplete="email">

    <label for="password">Contraseña</label>
    <input type="password" id="password" required minlength="6" autocomplete="new-password">

    <button type="submit" class="btn btn-primario btn-bloque" style="margin-top: 24px;">Crear cuenta</button>
    <div id="msg" class="oculto"></div>
  </form>
</div>

<script src="/js/api.js"></script>
<script>
  let rolSeleccionado = 'padre';
  document.querySelectorAll('.tarjeta-rol').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tarjeta-rol').forEach(b => b.classList.remove('activa'));
      btn.classList.add('activa');
      rolSeleccionado = btn.dataset.rol;
    });
  });

  document.getElementById('form-registro').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.classList.add('oculto');
    try {
      const { user } = await Api.post('/api/auth/register', {
        nombre: document.getElementById('nombre').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        rol: rolSeleccionado,
      });
      window.location.href = user.rol === 'padre' ? '/padre/inicio.html' : '/logopeda/panel.html';
    } catch (err) {
      mostrarError(msg, err.message);
    }
  });
</script>

</body>
</html>
