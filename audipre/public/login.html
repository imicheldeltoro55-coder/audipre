<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — AudiPre</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="topbar">
  <a href="/" class="marca">
    <div class="onda-marca"><span></span><span></span><span></span></div>
    <div class="marca-texto">AudiPre<small>Pre-implante coclear</small></div>
  </a>
  <div class="nav-usuario">
    <a href="/registro.html" class="btn btn-texto">Crear cuenta</a>
  </div>
</header>

<div class="contenedor" style="max-width: 420px; padding-top: 64px; padding-bottom: 64px;">
  <h1 style="font-size: 28px; text-align: center;">Bienvenido de nuevo</h1>
  <form id="form-login" class="tarjeta" style="margin-top: 28px;">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" required autocomplete="email">

    <label for="password">Contraseña</label>
    <input type="password" id="password" required autocomplete="current-password">

    <button type="submit" class="btn btn-primario btn-bloque" style="margin-top: 24px;">Iniciar sesión</button>
    <div id="msg" class="oculto"></div>
  </form>
</div>

<script src="/js/api.js"></script>
<script>
  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.classList.add('oculto');
    try {
      const { user } = await Api.post('/api/auth/login', {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });
      window.location.href = user.rol === 'padre' ? '/padre/inicio.html' : '/logopeda/panel.html';
    } catch (err) {
      mostrarError(msg, err.message);
    }
  });
</script>

</body>
</html>
