<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial — AudiPre</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .fila-historial {
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding: 14px 18px; background: var(--crema-carta); border:1px solid var(--borde);
    border-radius: 10px; margin-bottom: 10px; font-size: 14px;
  }
  .fila-historial time { color: var(--tinta-suave); font-size: 12.5px; white-space:nowrap; }
  .tabs { display:flex; gap:8px; margin-bottom: 24px; }
  .tab-btn {
    padding: 10px 20px; border-radius: 999px; border: 1.5px solid var(--borde);
    background: var(--crema-carta); cursor:pointer; font-weight:600; font-size:14px; color: var(--tinta-suave);
  }
  .tab-btn.activo { background: var(--tinta); color: white; border-color: var(--tinta); }
</style>
</head>
<body>

<header class="topbar" id="topbar"></header>

<div class="contenedor" style="max-width: 760px; padding-top: 40px; padding-bottom: 64px;">
  <h1 style="font-size: 26px;">Historial</h1>

  <div class="tabs">
    <button class="tab-btn activo" data-tab="cambios">Cambios de contenido</button>
    <button class="tab-btn" data-tab="asignaciones">Niños asignados</button>
  </div>

  <div id="panel-cambios"></div>
  <div id="panel-asignaciones" class="oculto"></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
(async function () {
  const user = await requireSession();
  if (!user) return;
  if (user.rol !== 'logopeda') { window.location.href = '/padre/inicio.html'; return; }
  renderTopbar(user, 'historial.html');

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
      btn.classList.add('activo');
      document.getElementById('panel-cambios').classList.toggle('oculto', btn.dataset.tab !== 'cambios');
      document.getElementById('panel-asignaciones').classList.toggle('oculto', btn.dataset.tab !== 'asignaciones');
    });
  });

  const ETIQUETAS_ACCION_CONTENIDO = {
    crear: 'Creó', editar: 'Editó', activar: 'Activó', desactivar: 'Desactivó',
  };
  const ETIQUETAS_TIPO = { ejercicio: 'un ejercicio', folleto_tema: 'un tema del folleto' };

  function formatearFecha(iso) {
    return new Date(iso.replace(' ', 'T') + 'Z').toLocaleString('es-ES', {
      day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit',
    });
  }

  const { historial: cambios } = await Api.get('/api/admin/historial-cambios');
  const contCambios = document.getElementById('panel-cambios');
  if (cambios.length === 0) {
    contCambios.innerHTML = '<p style="color: var(--tinta-suave);">Aún no hay cambios registrados.</p>';
  } else {
    contCambios.innerHTML = cambios.map(c => `
      <div class="fila-historial">
        <span><strong>${c.logopeda_nombre}</strong> ${ETIQUETAS_ACCION_CONTENIDO[c.accion] || c.accion} ${ETIQUETAS_TIPO[c.tipo_contenido] || ''} ${c.detalle ? '— ' + c.detalle : ''}</span>
        <time>${formatearFecha(c.creado_en)}</time>
      </div>
    `).join('');
  }

  const { historial: asignaciones } = await Api.get('/api/logopeda/historial-asignaciones');
  const contAsig = document.getElementById('panel-asignaciones');
  if (asignaciones.length === 0) {
    contAsig.innerHTML = '<p style="color: var(--tinta-suave);">Aún no tienes historial de niños asignados.</p>';
  } else {
    contAsig.innerHTML = asignaciones.map(a => `
      <div class="fila-historial">
        <span><strong>${a.nino_nombre}</strong> fue ${a.accion === 'asignado' ? 'asignado a ti' : 'desasignado de ti'}</span>
        <time>${formatearFecha(a.creado_en)}</time>
      </div>
    `).join('');
  }
})();
</script>

</body>
</html>
